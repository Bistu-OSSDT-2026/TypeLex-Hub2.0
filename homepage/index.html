<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小汪敲词练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('../backpaqe.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(139, 90, 43, 0.15);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: bold;
            color: #5D4037;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 80px;
            letter-spacing: 8px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .btn {
            padding: 16px 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #8D6E63, #5D4037);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(93, 64, 55, 0.4);
            text-decoration: none;
            display: inline-block;
            min-width: 220px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(93, 64, 55, 0.5);
            background: linear-gradient(135deg, #A1887F, #6D4C41);
        }

        .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(93, 64, 55, 0.4);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
                margin-bottom: 50px;
            }

            .btn {
                padding: 14px 40px;
                font-size: 1.2rem;
                min-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1>小汪敲词练</h1>
        <div class="buttons">
            <a href="./words.html" class="btn">单词学习</a>
            <a href="./typing.html" class="btn">打字大师</a>
        </div>
    </div>
</body>
</html>
